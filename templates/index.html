<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JARVIS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg:     #050f18;
    --bg2:    #081824;
    --bg3:    #0a1e2e;
    --border: #0d2e45;
    --cyan:   #00e5ff;
    --green:  #00ff88;
    --red:    #ff3b5c;
    --yellow: #ffd600;
    --text:   #b8dff0;
    --dim:    #3a6a85;
    --hud:    'Orbitron', monospace;
    --mono:   'Share Tech Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 1rem;
  }

  /* ---- Header ---- */
  .logo {
    font-family: var(--hud);
    font-size: 2.8rem;
    font-weight: 900;
    letter-spacing: 0.4em;
    color: var(--cyan);
    text-shadow: 0 0 20px #00e5ff66;
    margin-bottom: 0.3rem;
  }
  .sub {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--dim);
    margin-bottom: 2rem;
  }

  /* ---- Status bar ---- */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.7rem 1.2rem;
    width: 100%;
    max-width: 700px;
    margin-bottom: 1.2rem;
  }
  .dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--dim);
    box-shadow: 0 0 8px var(--dim);
    flex-shrink: 0;
    transition: all .4s;
  }
  .dot.ready      { background: var(--green); box-shadow: 0 0 10px var(--green); }
  .dot.listening  { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); animation: blink 0.8s ease-in-out infinite; }
  .dot.thinking   { background: var(--cyan);  box-shadow: 0 0 10px var(--cyan);  animation: blink 1.2s ease-in-out infinite; }

  @keyframes blink {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.5; transform:scale(1.3); }
  }
  .s-label {
    font-family: var(--hud);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: .15em;
    color: var(--dim);
    min-width: 80px;
    transition: color .4s;
  }
  .s-label.ready     { color: var(--green); }
  .s-label.listening { color: var(--yellow); }
  .s-label.thinking  { color: var(--cyan); }
  .s-sep { width:1px; height:16px; background:var(--border); }
  .s-msg { font-size: .78rem; color: var(--dim); }

  /* ---- Chat Box ---- */
  .chat-wrap {
    width: 100%;
    max-width: 700px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    background: var(--bg2);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 400px;
  }
  .c-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: .55rem 1rem;
    background: #071520;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .c-title {
    font-family: var(--hud);
    font-size: .65rem;
    letter-spacing: .2em;
    color: var(--cyan);
  }
  .clr-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: var(--mono);
    font-size: .65rem;
    padding: .2rem .6rem;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: .1em;
    transition: all .2s;
  }
  .clr-btn:hover { border-color: var(--cyan); color: var(--cyan); }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: .8rem;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar       { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 4px; }

  /* Message bubbles */
  .msg-wrap { display: flex; flex-direction: column; max-width: 80%; }
  .msg-wrap.user { align-self: flex-end; align-items: flex-end; }
  .msg-wrap.ai   { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-family: var(--hud);
    font-size: .55rem;
    letter-spacing: .15em;
    margin-bottom: .3rem;
  }
  .msg-wrap.user .msg-label { color: var(--yellow); }
  .msg-wrap.ai   .msg-label { color: var(--cyan); }

  .bubble {
    padding: .65rem 1rem;
    border-radius: 6px;
    font-size: .85rem;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg-wrap.user .bubble {
    background: #122238;
    border: 1px solid #1a4060;
    color: var(--yellow);
  }
  .msg-wrap.ai .bubble {
    background: #061a10;
    border: 1px solid #0d3320;
    color: var(--green);
  }
  .bubble.typing::after {
    content: '▋';
    animation: cursor 0.7s infinite;
  }
  @keyframes cursor { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ---- Input area ---- */
  .input-area {
    display: flex;
    gap: .6rem;
    padding: .8rem 1rem;
    background: #071520;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .text-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: .85rem;
    padding: .65rem 1rem;
    outline: none;
    transition: border-color .2s;
  }
  .text-input:focus { border-color: var(--cyan); }
  .text-input::placeholder { color: var(--dim); }
  .text-input:disabled { opacity: .4; }

  .icon-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 1.1rem;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .2s;
    flex-shrink: 0;
  }
  .icon-btn:hover:not(:disabled) { border-color: var(--cyan); color: var(--cyan); }
  .icon-btn:disabled { opacity: .3; cursor: not-allowed; }
  .icon-btn.mic-active { border-color: var(--yellow); color: var(--yellow); animation: blink 0.8s infinite; }

  .send-btn {
    background: #003822;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: var(--hud);
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: .15em;
    padding: 0 1.2rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all .2s;
    flex-shrink: 0;
  }
  .send-btn:hover:not(:disabled) { background: var(--green); color: #000; }
  .send-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* ---- Footer ---- */
  .footer {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 700px;
    margin-top: .9rem;
    font-size: .65rem;
    color: var(--dim);
    letter-spacing: .06em;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="logo">JARVIS</div>
<div class="sub">JUST A RATHER VERY INTELLIGENT SYSTEM</div>

<!-- Status bar -->
<div class="status-bar">
  <div class="dot" id="dot"></div>
  <span class="s-label" id="lbl">OFFLINE</span>
  <div class="s-sep"></div>
  <span class="s-msg" id="statusMsg">Backend se connect ho raha hai...</span>
</div>

<!-- Chat window -->
<div class="chat-wrap">
  <div class="c-head">
    <span class="c-title">// CONVERSATION</span>
    <button class="clr-btn" onclick="clearChat()">CLEAR</button>
  </div>

  <div class="messages" id="messages">
    <div class="msg-wrap ai">
      <div class="msg-label">J.A.R.V.I.S</div>
      <div class="bubble">Assalam o Alaikum! Main Jarvis hoon. Aap kuch bhi pooch sakte hain — ya bolein "open youtube", "what time is it", "weather in Karachi".</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <input
      class="text-input"
      id="textInput"
      type="text"
      placeholder="Jarvis se kuch poochho..."
      autocomplete="off"
    />
    <button class="icon-btn" id="micBtn" title="Voice input (Chrome/Edge only)">🎤</button>
    <button class="send-btn" id="sendBtn">SEND</button>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <span>JARVIS AI — Gemini &amp; Groq</span>
  <span id="clock">--:--:--</span>
</div>


<script>
// ══════════════════════════════════════════════════════
//  JARVIS FRONTEND — Fully connected to Flask backend
// ══════════════════════════════════════════════════════

const messagesDiv = document.getElementById("messages");
const textInput   = document.getElementById("textInput");
const sendBtn     = document.getElementById("sendBtn");
const micBtn      = document.getElementById("micBtn");
const dot         = document.getElementById("dot");
const lbl         = document.getElementById("lbl");
const statusMsg   = document.getElementById("statusMsg");

// ── Status update ──────────────────────────────────────
function setStatus(state, msg) {
  dot.className = "dot " + state;
  lbl.className = "s-label " + state;
  const labels = { ready: "ONLINE", listening: "LISTENING", thinking: "THINKING", "": "OFFLINE" };
  lbl.textContent = labels[state] || "OFFLINE";
  if (msg) statusMsg.textContent = msg;
}

// ── Add a message bubble ───────────────────────────────
function addMessage(who, text, typing = false) {
  const wrap   = document.createElement("div");
  wrap.className = `msg-wrap ${who}`;

  const label  = document.createElement("div");
  label.className = "msg-label";
  label.textContent = who === "user" ? "YOU" : "J.A.R.V.I.S";

  const bubble = document.createElement("div");
  bubble.className = "bubble" + (typing ? " typing" : "");
  bubble.textContent = text;

  wrap.appendChild(label);
  wrap.appendChild(bubble);
  messagesDiv.appendChild(wrap);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return bubble;
}

// ── Typing animation ───────────────────────────────────
function typeText(bubble, text, onDone) {
  bubble.classList.remove("typing");
  bubble.textContent = "";
  let i = 0;
  const timer = setInterval(() => {
    bubble.textContent += text[i];
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    i++;
    if (i >= text.length) {
      clearInterval(timer);
      if (onDone) onDone();
    }
  }, 18);
}

// ── Browser TTS (Web Speech API) ──────────────────────
function speak(text) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel(); // pehla cancel karo agar koi bol raha ho
  const u = new SpeechSynthesisUtterance(text);
  u.lang  = "en-US";
  u.rate  = 0.95;
  u.pitch = 0.85;
  window.speechSynthesis.speak(u);
}

// ── Main send function ────────────────────────────────
async function handleSend() {
  const query = textInput.value.trim();
  if (!query) return;

  textInput.value = "";
  sendBtn.disabled = true;
  textInput.disabled = true;

  // User ka message dikho
  addMessage("user", query);

  // Status: thinking
  setStatus("thinking", "Jawab dhundh raha hoon...");

  // "..." placeholder bubble
  const aiBubble = addMessage("ai", "...", true);

  try {
    const res = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query })
    });

    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    const data = await res.json();

    // Typing effect se jawab dikhao
    typeText(aiBubble, data.response, () => {
      setStatus("ready", "Tayyar hoon. Kuch aur poochho!");
    });

    // Browser se bolwao
    speak(data.response);

    // Agar koi action hai (jaise website kholna)
    if (data.action === "open_url" && data.action_data) {
      setTimeout(() => window.open(data.action_data, "_blank"), 500);
    }

  } catch (err) {
    aiBubble.classList.remove("typing");
    aiBubble.textContent = "❌ Backend se connection nahi hua. Jarvis.py chal raha hai?";
    aiBubble.style.color = "var(--red)";
    setStatus("", "Backend offline");
    console.error(err);
  } finally {
    sendBtn.disabled = false;
    textInput.disabled = false;
    textInput.focus();
  }
}

// ── Send button + Enter key ───────────────────────────
sendBtn.addEventListener("click", handleSend);
textInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) handleSend();
});

// ── Clear chat ────────────────────────────────────────
function clearChat() {
  messagesDiv.innerHTML = "";
  addMessage("ai", "Chat saaf kar diya. Dobara poochho!");
}

// ── Microphone (browser Speech Recognition) ──────────
let isListening = false;
let recognition = null;

micBtn.addEventListener("click", () => {
  if (isListening) {
    recognition.stop();
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    alert("Voice input sirf Chrome ya Edge mein kaam karta hai.");
    return;
  }

  recognition = new SR();
  recognition.lang = "en-US";
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add("mic-active");
    micBtn.textContent = "🔴";
    setStatus("listening", "Sun raha hoon... bolo!");
  };

  recognition.onresult = (e) => {
    const spoken = e.results[0][0].transcript;
    textInput.value = spoken;
    handleSend();
  };

  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove("mic-active");
    micBtn.textContent = "🎤";
    if (lbl.textContent === "LISTENING") setStatus("ready", "Tayyar hoon.");
  };

  recognition.onerror = (e) => {
    alert("Mic error: " + e.error);
    isListening = false;
    micBtn.classList.remove("mic-active");
    micBtn.textContent = "🎤";
  };

  recognition.start();
});

// ── Clock ─────────────────────────────────────────────
function tick() {
  const n = new Date();
  const p = x => String(x).padStart(2, "0");
  document.getElementById("clock").textContent =
    p(n.getHours()) + ":" + p(n.getMinutes()) + ":" + p(n.getSeconds());
}
setInterval(tick, 1000);
tick();

// ── On page load: check backend connection ────────────
window.onload = async () => {
  try {
    const res = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: "hello" })
    });
    if (res.ok) {
      setStatus("ready", "Backend se connected! Kuch poochho.");
    } else {
      setStatus("", "Backend se connection fail hua.");
    }
  } catch {
    setStatus("", "Jarvis.py chal raha hai? python Jarvis.py chalao.");
  }
};
</script>

</body>
</html>
